server:
  port: 8080

spring:
  application:
    name: clearpath-server

  datasource:
    url: jdbc:mysql://localhost:3306/clearpath_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: clearpath_user
    password: [REDACTED:PASSWORD]
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

jwt:
  secret: [REDACTED:AWS_SECRET_KEY]
  expiration: 86400000